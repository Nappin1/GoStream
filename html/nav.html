<!-- ============================================================
     NAVIGATION
     Desktop top nav + Mobile bottom nav + More menu overlay
     ============================================================ -->

<!-- DESKTOP TOP NAV -->
<nav id="top-navbar"
    class="fixed top-0 left-0 right-0 z-[100] h-20 hidden lg:flex items-center justify-between px-8 transition-all duration-300">
    <!-- Logo -->
    <a onclick="router('home')" class="cursor-pointer flex items-center gap-2">
        <div class="bg-primary w-8 h-8 rounded-full flex items-center justify-center">
            <i class="ph-fill ph-play text-white ml-0.5 text-sm"></i>
        </div>
        <h1 class="text-2xl font-extrabold text-white tracking-tight">Go<span class="text-primary">Stream</span></h1>
    </a>

    <!-- Main Links -->
    <div class="flex items-center space-x-2">
        <a onclick="router('home')" data-target="home"
            class="nav-link px-4 py-2 text-sm font-bold rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all cursor-pointer">Home</a>
        <a onclick="router('movies')" data-target="movies"
            class="nav-link px-4 py-2 text-sm font-bold rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all cursor-pointer">Movies</a>
        <a onclick="router('tv')" data-target="tv"
            class="nav-link px-4 py-2 text-sm font-bold rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all cursor-pointer">TV Shows</a>
        <a onclick="router('anime-anilist')" data-target="anime-anilist"
            class="nav-link px-4 py-2 text-sm font-bold rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all cursor-pointer">Anime</a>
        <a onclick="router('watchlist')" data-target="watchlist"
            class="nav-link px-4 py-2 text-sm font-bold rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all cursor-pointer">Library</a>
        <a onclick="router('history')" data-target="history"
            class="nav-link px-4 py-2 text-sm font-bold rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all cursor-pointer">History</a>
    </div>

    <!-- Utilities -->
    <div class="flex items-center space-x-4">
        <a onclick="router('search')" data-target="search" title="Search"
            class="cursor-pointer text-gray-300 hover:text-white hover:bg-white/10 rounded-full h-10 w-10 flex items-center justify-center transition-colors">
            <i class="ph ph-magnifying-glass text-lg"></i>
        </a>
        <a onclick="router('legal')" data-target="legal" title="Legal/DMCA"
            class="cursor-pointer text-gray-300 hover:text-white hover:bg-white/10 rounded-full h-10 w-10 flex items-center justify-center transition-colors">
            <i class="ph ph-scales text-lg"></i>
        </a>
    </div>
</nav>

<!-- MOBILE BOTTOM NAV -->
<div id="bottom-nav"
    class="lg:hidden fixed bottom-0 left-0 right-0 bg-[#020617] z-50 flex justify-around items-center h-[70px] pb-[env(safe-area-inset-bottom)] transition-all duration-300">
    <button onclick="router('home')" data-target="home" title="Home"
        class="bottom-nav-item flex flex-col items-center justify-center gap-1.5 w-full h-full text-gray-400 hover:text-white transition-all group">
        <i class="ph ph-house group-[.active]:text-primary transition-colors"></i>
        <span class="text-[10px] font-bold tracking-wide opacity-70 group-[.active]:opacity-100 group-[.active]:text-primary">Home</span>
    </button>
    <button onclick="router('search')" data-target="search" title="Search"
        class="bottom-nav-item flex flex-col items-center justify-center gap-1.5 w-full h-full text-gray-400 hover:text-white transition-all group">
        <i class="ph ph-magnifying-glass group-[.active]:text-primary transition-colors"></i>
        <span class="text-[10px] font-bold tracking-wide opacity-70 group-[.active]:opacity-100 group-[.active]:text-primary">Search</span>
    </button>
    <button onclick="toggleMoreMenu()" id="more-btn" title="More"
        class="bottom-nav-item flex flex-col items-center justify-center gap-1.5 w-full h-full text-gray-400 hover:text-white transition-all group">
        <i class="ph ph-list transition-colors"></i>
        <span class="text-[10px] font-bold tracking-wide opacity-70">More</span>
    </button>
</div>

<!-- MORE MENU OVERLAY (Mobile) -->
<div id="more-menu-modal"
    class="fixed inset-0 z-[60] bg-[#020617]/60 backdrop-blur-sm hidden flex flex-col justify-end transition-opacity duration-300"
    onclick="toggleMoreMenu()">
    <div class="mb-24 mx-4 bg-[#1e1e1e] border border-border-color rounded-2xl overflow-hidden shadow-2xl transform transition-transform duration-300 translate-y-full"
        id="more-menu-content" onclick="event.stopPropagation()">
        <div class="p-4 grid grid-cols-4 gap-4">
            <button onclick="router('movies'); toggleMoreMenu()" class="flex flex-col items-center gap-2 group">
                <div class="w-12 h-12 rounded-full bg-white/5 group-hover:bg-primary/20 flex items-center justify-center transition-colors">
                    <i class="ph ph-film-strip text-white group-hover:text-primary text-xl"></i>
                </div>
                <span class="text-xs text-gray-300 group-hover:text-white">Movies</span>
            </button>
            <button onclick="router('tv'); toggleMoreMenu()" class="flex flex-col items-center gap-2 group">
                <div class="w-12 h-12 rounded-full bg-white/5 group-hover:bg-primary/20 flex items-center justify-center transition-colors">
                    <i class="ph ph-television text-white group-hover:text-primary text-xl"></i>
                </div>
                <span class="text-xs text-gray-300 group-hover:text-white">TV Shows</span>
            </button>
            <button onclick="router('anime-anilist'); toggleMoreMenu()" class="flex flex-col items-center gap-2 group">
                <div class="w-12 h-12 rounded-full bg-white/5 group-hover:bg-primary/20 flex items-center justify-center transition-colors">
                    <i class="ph ph-mask-happy text-white group-hover:text-primary text-xl"></i>
                </div>
                <span class="text-xs text-gray-300 group-hover:text-white">Anime</span>
            </button>
            <button onclick="router('watchlist'); toggleMoreMenu()" class="flex flex-col items-center gap-2 group">
                <div class="w-12 h-12 rounded-full bg-white/5 group-hover:bg-primary/20 flex items-center justify-center transition-colors">
                    <i class="ph ph-books text-white group-hover:text-primary text-xl"></i>
                </div>
                <span class="text-xs text-gray-300 group-hover:text-white">Library</span>
            </button>
            <button onclick="router('history'); toggleMoreMenu()" class="flex flex-col items-center gap-2 group">
                <div class="w-12 h-12 rounded-full bg-white/5 group-hover:bg-primary/20 flex items-center justify-center transition-colors">
                    <i class="ph ph-clock-counter-clockwise text-white group-hover:text-primary text-xl"></i>
                </div>
                <span class="text-xs text-gray-300 group-hover:text-white">History</span>
            </button>
            <button onclick="router('legal'); toggleMoreMenu()" class="flex flex-col items-center gap-2 group">
                <div class="w-12 h-12 rounded-full bg-white/5 group-hover:bg-primary/20 flex items-center justify-center transition-colors">
                    <i class="ph ph-scales text-white group-hover:text-primary text-xl"></i>
                </div>
                <span class="text-xs text-gray-300 group-hover:text-white">Legal</span>
            </button>
        </div>
        <div class="border-t border-white/5 p-2 bg-[#020617]/20 flex justify-between"></div>
    </div>
</div>
